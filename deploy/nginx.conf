# /etc/nginx/sites-available/flexiwork
# Serves the built React app as static files and proxies everything else to Spring Boot.

server {
    listen 80;
    server_name YOUR_DOMAIN_OR_IP;

    client_max_body_size 25M;

    # React build output (frontend/dist copied here during deploy)
    root /opt/flexiwork/frontend-dist;
    index index.html;

    # API
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Thymeleaf admin panel
    location /admin {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cookie_flags ~ secure samesite=strict;
    }

    # Static admin assets / Swagger / uploaded files served by the backend
    location ~ ^/(css|js|images|webjars|swagger-ui|v3|uploads)/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
    }

    # React SPA fallback
    location / {
        try_files $uri /index.html;
    }
}
