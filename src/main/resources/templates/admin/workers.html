<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <script>(function(){try{var t=localStorage.getItem('fw-theme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}}());</script>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FlexiWork Admin — Workers</title>
  <style th:utext="${adminCss}"></style>
</head>
<body>
<div class="app">
  <div th:replace="~{admin/fragments :: sidebar('workers')}"></div>
  <main class="main"><div class="content">

    <div th:replace="~{admin/fragments :: pageHeader('Workers', 'Pending worker verifications')}"></div>

    <div class="empty" th:if="${workers.isEmpty()}">No workers awaiting verification.</div>

    <div class="table-wrap" th:unless="${workers.isEmpty()}">
      <table>
        <thead>
        <tr><th>Name</th><th>NIC</th><th>District</th><th>Photo</th><th>NIC Front</th><th>NIC Back</th><th>Actions</th></tr>
        </thead>
        <tbody>
        <tr th:each="w : ${workers}" class="worker-row"
            th:attr="data-id=${w.id},data-name=${w.fullName},data-nic=${w.nicNumber},data-district=${w.district},data-photo=${w.profilePhotoPath != null ? '/api/files/' + w.profilePhotoPath : ''},data-nicfront=${w.nicFrontPath != null ? '/admin/files/' + w.nicFrontPath : ''},data-nicback=${w.nicBackPath != null ? '/admin/files/' + w.nicBackPath : ''}">
          <td style="font-weight:600;" th:text="${w.fullName}">Kamal</td>
          <td th:text="${w.nicNumber}">1990...</td>
          <td th:text="${w.district}">COLOMBO</td>
          <td><img class="thumb" th:if="${w.profilePhotoPath}" th:src="@{'/api/files/' + ${w.profilePhotoPath}}" alt="photo"/></td>
          <td><img class="thumb" th:if="${w.nicFrontPath}" th:src="@{'/admin/files/' + ${w.nicFrontPath}}" alt="nic front"/></td>
          <td><img class="thumb" th:if="${w.nicBackPath}" th:src="@{'/admin/files/' + ${w.nicBackPath}}" alt="nic back"/></td>
          <td>
            <div class="actions">
              <button type="button" class="btn btn-primary fw-review-btn">Review</button>
            </div>
          </td>
        </tr>
        </tbody>
      </table>
    </div>

  </div></main>
</div>

<!-- Worker review popup -->
<div class="modal-backdrop" id="fw-worker-backdrop">
  <div class="modal-card">
    <div class="modal-header">
      <div id="fw-worker-name" style="font-weight:700;"></div>
      <button type="button" class="modal-close" id="fw-worker-close" aria-label="Close">&times;</button>
    </div>
    <div class="modal-body">
      <div class="modal-field"><span class="modal-label">NIC</span><span id="fw-worker-nic"></span></div>
      <div class="modal-field"><span class="modal-label">District</span><span id="fw-worker-district"></span></div>
      <div style="display:flex;gap:14px;margin-top:14px;flex-wrap:wrap;">
        <div>
          <div style="color:var(--text-muted);font-size:12.5px;margin-bottom:6px;">Photo</div>
          <img id="fw-worker-photo" style="width:140px;height:140px;object-fit:cover;border-radius:10px;display:none;"/>
        </div>
        <div>
          <div style="color:var(--text-muted);font-size:12.5px;margin-bottom:6px;">NIC Front</div>
          <img id="fw-worker-nicfront" style="width:140px;height:140px;object-fit:cover;border-radius:10px;display:none;"/>
        </div>
        <div>
          <div style="color:var(--text-muted);font-size:12.5px;margin-bottom:6px;">NIC Back</div>
          <img id="fw-worker-nicback" style="width:140px;height:140px;object-fit:cover;border-radius:10px;display:none;"/>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <form class="inline" method="post" id="fw-worker-verify-form">
        <input type="hidden" name="_method" value="put"/>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" name="status" value="VERIFIED"/>
        <button class="btn btn-primary" type="submit">Verify</button>
      </form>
      <form class="inline" method="post" id="fw-worker-reject-form">
        <input type="hidden" name="_method" value="put"/>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" name="status" value="REJECTED"/>
        <button class="btn btn-danger" type="submit">Reject</button>
      </form>
    </div>
  </div>
</div>

<script>
(function(){
  var backdrop = document.getElementById('fw-worker-backdrop');
  var verifyForm = document.getElementById('fw-worker-verify-form');
  var rejectForm = document.getElementById('fw-worker-reject-form');

  function setImg(id, src) {
    var img = document.getElementById(id);
    if (src) { img.src = src; img.style.display = ''; }
    else { img.removeAttribute('src'); img.style.display = 'none'; }
  }

  function open(row) {
    document.getElementById('fw-worker-name').textContent = row.getAttribute('data-name');
    document.getElementById('fw-worker-nic').textContent = row.getAttribute('data-nic');
    document.getElementById('fw-worker-district').textContent = row.getAttribute('data-district');
    setImg('fw-worker-photo', row.getAttribute('data-photo'));
    setImg('fw-worker-nicfront', row.getAttribute('data-nicfront'));
    setImg('fw-worker-nicback', row.getAttribute('data-nicback'));

    var action = '/admin/workers/' + row.getAttribute('data-id') + '/status';
    verifyForm.action = action;
    rejectForm.action = action;

    backdrop.classList.add('open');
  }
  function close() { backdrop.classList.remove('open'); }

  document.querySelectorAll('.worker-row').forEach(function(row){
    row.querySelector('.fw-review-btn').addEventListener('click', function(){ open(row); });
  });
  document.getElementById('fw-worker-close').addEventListener('click', close);
  backdrop.addEventListener('click', function(e){ if (e.target === backdrop) close(); });
  document.addEventListener('keydown', function(e){ if (e.key === 'Escape') close(); });
})();
</script>
</body>
</html>
