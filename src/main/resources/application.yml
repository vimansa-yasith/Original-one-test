spring:
  application:
    name: flexiwork
  profiles:
    active: dev

  datasource:
    url: jdbc:mysql://mysql.railway.internal:3306/railway
    username: root
    password: PqANdDdVRGtHNtHhErREcbmUcVWFcjBf
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false
    show-sql: false

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 25MB     # registration uploads several files at once

  # Gmail SMTP for email OTP. Leave password blank to run in "log instead of send" mode.
  mail:
    host: smtp.gmail.com
    port: 587
    username: ""               # your gmail address
    password: ""               # 16-char Gmail App Password (NOT your login password)
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  thymeleaf:
    cache: false

  mvc:
    hiddenmethod:
      filter:
        enabled: true     # enables HiddenHttpMethodFilter for _method PUT/DELETE in admin forms

server:
  port: ${PORT:8080}
  servlet:
    session:
      timeout: 30m
      cookie:
        http-only: true
        same-site: lax
        secure: false           # dev only; overridden to true in application-prod.yml

# ----------------------------------------------------------------------------
# FlexiWork application settings
# ----------------------------------------------------------------------------
flexiwork:
  # Public base URL of this server (used to build absolute QR image links for WhatsApp).
  # In production set this to the publicly reachable HTTPS origin.
  public-base-url: ${FLEXIWORK_PUBLIC_BASE_URL:http://localhost:8080}

  jwt:
    # Base64-ish long secret; override via JWT_SECRET env var in real deployments. Must be >= 32 bytes for HS256.
    secret: ${JWT_SECRET:flexiwork-dev-secret-change-me-please-0123456789-abcdefgh}
    expiration-ms: 86400000      # 24h

  uploads:
    dir: uploads                 # relative to working dir; worker/company files land here

  payment:
    commission-rate: 0.10        # 10% — stored on each Payment at creation, never hardcoded in math
    grace-days: 7                # company must pay within 7 days or it is suspended

  approval:
    auto-window-minutes: 720     # PENDING accounts auto-approve after 12h (lower this to demo)

  application:
    cancel-cutoff-hours: 2       # cannot cancel within 2h of the shift start

  support-email: support@flexiwork.lk   # contact-form submissions are forwarded here

  cors:
    # Comma-separated list of allowed frontend origins. Override via FLEXIWORK_CORS_ALLOWED_ORIGINS
    # in production (e.g. https://app.flexiwork.lk) — never leave this as the Vite dev origin.
    allowed-origins: ${FLEXIWORK_CORS_ALLOWED_ORIGINS:http://localhost:5173}

  whatsapp:
    enabled: true
    service-url: ${WHATSAPP_SERVICE_URL:http://localhost:3001}
    shared-secret: ${WHATSAPP_SHARED_SECRET:dev-only-change-me}

  otp:
    length: 6
    ttl-minutes: 5
    max-attempts: 3
    resend-cooldown-seconds: 60

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    com.flexiwork: INFO
